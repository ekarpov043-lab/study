version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: medical_bot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: medical_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: medical_bot_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      VK_GROUP_TOKEN: "${VK_GROUP_TOKEN}"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: medical_bot
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - ./logs:/app/logs

volumes:
  pgdata:
